name: Security audit

on:
  schedule:
    - cron: '0 8 * * 1'   # every Monday at 08:00 UTC
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - 'package.json'
      - 'package-lock.json'

permissions:
  contents: read
  issues:   write

jobs:
  audit:
    name: npm audit (high+)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Run audit
        id: audit
        run: |
          npm audit --audit-level=high --json > audit-report.json 2>&1 || true
          VULN_COUNT=$(node -e "
            const r = require('./audit-report.json');
            const m = r.metadata?.vulnerabilities ?? {};
            console.log((m.high ?? 0) + (m.critical ?? 0));
          ")
          echo "vuln_count=$VULN_COUNT" >> "$GITHUB_OUTPUT"

      - name: Create GitHub issue if vulnerabilities found
        if: steps.audit.outputs.vuln_count != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const fs   = require('fs')
            const raw  = fs.readFileSync('audit-report.json', 'utf8')
            const report = JSON.parse(raw)
            const vulns  = report.metadata?.vulnerabilities ?? {}

            const body = [
              '## npm audit found high/critical vulnerabilities',
              '',
              `| Severity | Count |`,
              `|----------|-------|`,
              `| Critical | ${vulns.critical ?? 0} |`,
              `| High     | ${vulns.high ?? 0} |`,
              '',
              '### Affected packages',
              '',
              Object.entries(report.vulnerabilities ?? {})
                .filter(([, v]) => ['high','critical'].includes(v.severity))
                .map(([name, v]) => `- **${name}** (${v.severity}): ${v.title ?? v.via?.[0]?.title ?? 'see report'}`)
                .join('\n'),
              '',
              '<details><summary>Full audit JSON</summary>',
              '',
              '```json',
              JSON.stringify(report, null, 2).slice(0, 60_000),
              '```',
              '',
              '</details>',
              '',
              '_Triggered by the weekly security workflow. Run `npm audit fix` or review `npm audit` locally._',
            ].join('\n')

            const existingIssues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              labels: ['security'],
              state:  'open',
            })

            const alreadyOpen = existingIssues.data.some(
              (i) => i.title === '🔒 npm audit: high/critical vulnerabilities detected'
            )

            if (!alreadyOpen) {
              await github.rest.issues.create({
                owner:  context.repo.owner,
                repo:   context.repo.repo,
                title:  '🔒 npm audit: high/critical vulnerabilities detected',
                body,
                labels: ['security'],
              })
            } else {
              console.log('Security issue already open — skipping duplicate creation.')
            }
