name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-type:
    name: Lint & type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake

      - name: Lint
        run: npm run lint
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_fake
          CLERK_SECRET_KEY: sk_test_fake
          NEXT_PUBLIC_SUPABASE_URL: https://fake.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: eyJfake
          OPENAI_API_KEY: sk-fake-key-for-ci
          AI_PROVIDER: ollama
          STRIPE_SECRET_KEY: sk_test_fake
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_fake

      - name: Type check
        run: npm run type-check
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake

      - name: Run tests
        run: npm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-type, test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Build
        run: npm run build
        env:
          DATABASE_URL: postgresql://fake:fake@localhost:5432/fake
          DIRECT_URL: postgresql://fake:fake@localhost:5432/fake
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_placeholder
          CLERK_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_key
          SUPABASE_SERVICE_ROLE_KEY: placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
          ANTHROPIC_API_KEY: sk-ant-placeholder
          OPENAI_API_KEY: sk-placeholder
          AI_PROVIDER: ollama
          STRIPE_SECRET_KEY: sk_test_placeholder
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          INNGEST_EVENT_KEY: placeholder
          INNGEST_SIGNING_KEY: placeholder
          UPSTASH_REDIS_REST_URL: https://placeholder.upstash.io
          UPSTASH_REDIS_REST_TOKEN: placeholder
          NEXT_PUBLIC_POSTHOG_KEY: phc_placeholder
          SENTRY_DSN: https://placeholder@sentry.io/0
          EMAIL_HOST: smtp.gmail.com
          EMAIL_PORT: '587'
          EMAIL_USER: placeholder@gmail.com
          EMAIL_PASS: placeholder
          EMAIL_FROM: PromptForge <placeholder@gmail.com>
