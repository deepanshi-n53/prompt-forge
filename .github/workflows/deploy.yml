name: Deploy

on:
  push:
    branches: [main]

jobs:
  migrate:
    name: Database migration
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm

      - name: Install dependencies
        run: npm install --legacy-peer-deps --ignore-scripts

      - name: Generate Prisma client
        run: npx prisma generate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

      - name: Run migrations
        continue-on-error: true
        run: |
          if [ -z "$DIRECT_URL" ]; then
            echo "::notice::DIRECT_URL secret not set — skipping migration"
            exit 0
          fi
          npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DIRECT_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}

  # Railway auto-deploys when it detects a push to main.
  # This job waits for Railway to finish, then verifies the deployment.
  smoke-test:
    name: Smoke test
    runs-on: ubuntu-latest
    needs: migrate
    environment: production
    steps:
      - name: Wait for Railway deployment
        run: sleep 180

      - name: Health check
        run: |
          curl \
            --fail \
            --retry 10 \
            --retry-delay 20 \
            --retry-connrefused \
            --max-time 30 \
            "https://prompt-forge-production.up.railway.app/api/health"
